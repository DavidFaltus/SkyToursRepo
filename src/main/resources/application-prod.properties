# Produkční konfigurace - bez databáze (pouze pro testování)
# Pro produkci použijte Cloud SQL s application-gcp.properties

# H2 In-Memory databáze pro testování (bez externí DB)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA a Hibernate nastavení
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# H2 Console (pouze pro development)
spring.h2.console.enabled=true

# Upload souborů (pro ukládání obrázků)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Server
server.port=${PORT:8080}

# JWT Security klíč (měl by být dlouhý min 256 bitů)
jwt.secret=4fB8L0uF2wT8Z2pL4vH1mA5gK9yN6sC3eR7tJ2qY5xW8zV3uK9nR7bM4cX1pZ6hA
jwt.expiration=86400000

# Health check - bez autentizace
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
