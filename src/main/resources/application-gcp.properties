# Databáze - Google Cloud SQL
# Pokud máte Cloud SQL Proxy, připojte se takto:
# spring.datasource.url=jdbc:postgresql://localhost:5432/skytours
# Pro přímé připojení k Cloud SQL (s Cloud SQL Connector):
# spring.datasource.url=jdbc:postgresql://google/skytours?cloudSqlInstance=PROJECT:REGION:INSTANCE_NAME&user=skytours_app&password=PASSWORD
# Prozatím nastavuji localhost - později se změní na Cloud SQL
spring.datasource.url=jdbc:postgresql://localhost:5432/skytours
spring.datasource.username=skytours_app
spring.datasource.password=app_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA a Hibernate nastavení
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Upload souborů (pro ukládání obrázků)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Server
server.port=${PORT:8080}

# JWT Security klíč (měl by být dlouhý min 256 bitů)
jwt.secret=4fB8L0uF2wT8Z2pL4vH1mA5gK9yN6sC3eR7tJ2qY5xW8zV3uK9nR7bM4cX1pZ6hA
jwt.expiration=86400000

# Health check - povolení bez autentizace
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
