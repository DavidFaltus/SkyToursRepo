# Databáze - P?ipojení (s u?ivatelem skytours_app vytvo?eným v init.sql)
spring.datasource.url=jdbc:postgresql://localhost:5432/skytours
spring.datasource.username=skytours_app
spring.datasource.password=app_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA a Hibernate nastavení
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Upload soubor? (pro ukládání obrázk?)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Aplikace poběží na portu 8080 (backend)
server.port=${PORT:8080}

