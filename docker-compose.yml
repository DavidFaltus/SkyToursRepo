version: '3.8'

services:
  db:
    image: postgres:15
    container_name: skytours-db
    environment:
      POSTGRES_USER: skytours_admin
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: skytours
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres-data: